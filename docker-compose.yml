services:
  db:
    image: postgres:16
    container_name: nexusshop-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-nexusshop}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nexusshop-network

  app:
    build: .
    container_name: nexusshop-api
    depends_on:
      - db
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}

      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME:-nexusshop}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}

      SPRING_JPA_HIBERNATE_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      SPRING_JPA_SHOW_SQL: ${JPA_SHOW_SQL:-true}

      JWT_SECRET: ${JWT_SECRET:-default_secret_key}

      MINIO_URL: http://minio:9000
      MINIO_USER: ${MINIO_USER:-minioadmin}
      MINIO_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
      MINIO_BUCKET: ratings

    restart: always
    networks:
      - nexusshop-network
  
  minio:
      image: minio/minio
      container_name: nexusshop-minio
      ports:
        - "9000:9000"
        - "9001:9001"
      environment:
        MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
        MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
      command: server /data --console-address ":9001"
      volumes:
        - minio_data:/data
      networks:
        - nexusshop-network

volumes:
  postgres_data:
  minio_data:

networks:
  nexusshop-network:
    driver: bridge