spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/nexusshop}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}

spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/nexusshop}
spring.flyway.user=${SPRING_DATASOURCE_USERNAME:postgres}
spring.flyway.password=${SPRING_DATASOURCE_PASSWORD:postgres}
logging.level.org.flywaydb=DEBUG
logging.level.org.springframework.boot.autoconfigure.flyway=DEBUG
logging.level.org.flywaydb.core=DEBUG
logging.level.org.flywaydb.core.internal=DEBUG
spring.flyway.validate-on-migrate=true
spring.flyway.baseline-on-migrate=true
spring.flyway.fail-on-missing-locations=true

coherence.api.key=${COHERE_API_KEY:default_cohere_api_key}

server.port=${SERVER_PORT:8080}

springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
    
# JWT
jwt.secret=QmFzZTY0U2VjcmV0S2V5Rm9ySldUQXV0aGVudGljYXRpb24xMjM0NTY=
jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}

